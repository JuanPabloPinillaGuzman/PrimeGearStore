name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    env:
      # Prefer repo/environment secret when available; fallback keeps CI deterministic
      # for generate/validate/build in workflows that do not require a live DB.
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/postgres?sslmode=require' }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET != '' && secrets.AUTH_SECRET || 'ci-temporary-auth-secret' }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL != '' && secrets.PUBLIC_BASE_URL || 'http://localhost:3000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma Generate
        run: npm run prisma:generate

      - name: Prisma Validate
        run: npm run prisma:validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
